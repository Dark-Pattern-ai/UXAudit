services:
  postgres:
    image: postgres:16
    container_name: uxaudit-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: uxaudit
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: uxaudit_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uxaudit -d uxaudit_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uxaudit-net

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: uxaudit-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - uxaudit-net

  frontend-mock:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: uxaudit-frontend-mock
    profiles:
      - mock
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3000/api
    depends_on:
      - backend-mock
    restart: unless-stopped
    networks:
      - uxaudit-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uxaudit-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://uxaudit:1234@postgres:5432/uxaudit_db?schema=public
      AI_SERVER_URL: http://ai-server:8000
      USE_MOCK_AI: "false"
    depends_on:
      postgres:
        condition: service_healthy
      ai-server:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    networks:
      - uxaudit-net

  backend-mock:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uxaudit-backend-mock
    profiles:
      - mock
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      USE_MOCK_AI: "true"
      MOCK_CATEGORY: ""
    restart: unless-stopped
    networks:
      - uxaudit-net

  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: uxaudit-ai
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - uxaudit-net
    
  

networks:
  uxaudit-net:
    driver: bridge

volumes:
  postgres_data:
